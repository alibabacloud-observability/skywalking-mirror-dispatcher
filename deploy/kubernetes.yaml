apiVersion: v1
kind: ConfigMap
metadata:
  name: skywalking-mirror-config
data:
  LISTEN_ADDR: ":11800"
  ADMIN_ADDR: ":8080"
  OAP_ENDPOINT: "skywalking-oap.default.svc.cluster.local:11800"
  OAP_TLS: "false"
  ARMS_ENDPOINT: "replace-with-arms-skywalking-endpoint:443"
  GRPC_MAX_MESSAGE_BYTES: "52428800"
  MAX_INFLIGHT_RPCS: "1024"
  ARMS_MAX_CONCURRENT_RPCS: "64"
  ARMS_STREAM_QUEUE_SIZE: "128"
  ARMS_FINISH_TIMEOUT: "5s"
  DRAIN_TIMEOUT: "30s"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skywalking-mirror
  labels:
    app.kubernetes.io/name: skywalking-mirror
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: skywalking-mirror
  template:
    metadata:
      labels:
        app.kubernetes.io/name: skywalking-mirror
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 35
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mirror
          image: ghcr.io/alibabacloud-observability/skywalking-mirror-dispatcher:0.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: skywalking-mirror-config
          env:
            - name: ARMS_AUTHENTICATION
              valueFrom:
                secretKeyRef:
                  name: skywalking-mirror-secrets
                  key: ARMS_AUTHENTICATION
          ports:
            - name: grpc
              containerPort: 11800
              protocol: TCP
            - name: admin
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: admin
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: admin
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: skywalking-mirror
  labels:
    app.kubernetes.io/name: skywalking-mirror
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: skywalking-mirror
  ports:
    - name: grpc
      port: 11800
      targetPort: grpc
      protocol: TCP
